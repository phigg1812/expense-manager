name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Add Firebase config (google-services.json)
        run: cp google-services.json android/app/google-services.json

      - name: Patch Gradle files (google-services plugin + fixed debug keystore)
        run: python3 scripts/patch_gradle.py

      - name: Generate app icons & splash screen
        run: npx @capacitor/assets generate --android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-manager-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
